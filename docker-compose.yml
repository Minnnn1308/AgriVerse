version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: agtech_timescaledb
    environment:
      POSTGRES_DB: agtech_db
      POSTGRES_USER: agtech_admin
      POSTGRES_PASSWORD: agtech_password
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always

volumes:
  timescaledb_data:
